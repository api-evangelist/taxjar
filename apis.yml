apis:
  - name: TaxJar Sales Tax API
    description: >-
      REST API for real-time sales tax calculation, rate lookups, tax category
      listing, transaction management (create, update, delete, list), customer
      exemption management, nexus region tracking, and address validation.
      Supports token-based authentication via Authorization header.
