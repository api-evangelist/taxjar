specification: API Commons Plans
specificationVersion: '0.1'
provider: TaxJar
providerId: taxjar
created: '2026-06-12'
modified: '2026-06-12'
reconciled: true
url: https://www.taxjar.com/pricing/
plans:
  - name: Starter
    description: >-
      Entry-level plan for businesses primarily selling on marketplaces such as
      Amazon, Etsy, or eBay. Includes up to three standard data import
      integrations, single-user access, manual filing with sales tax reports,
      and two AutoFile credits per year. Does not include API access.
    type: paid
    monthlyPrice: 39.00
    currency: USD
    trialDays: 30
    annualDiscount: true
    annualDiscountNote: Save 10% or more with annual pricing
    features:
      - type: quota
        name: orders
        description: Monthly order volume included
        metric: orders/month
        limit: 200
        overage: true
        overageNote: Flex fees allow temporary moves to higher tier
      - type: boolean
        name: apiAccess
        description: Real-time API tax calculations
        value: false
      - type: quota
        name: dataIntegrations
        description: Standard data import integrations
        metric: integrations
        limit: 3
      - type: boolean
        name: multiUser
        description: Multi-user access with roles
        value: false
      - type: quota
        name: autoFileCredits
        description: Included AutoFile credits per year
        metric: credits/year
        limit: 2
      - type: metered
        name: additionalAutoFile
        description: Additional AutoFile return beyond included credits
        metric: per return
        price: 50.00
        currency: USD
    additionalFees:
      - name: State Registration
        price: 299.00
        currency: USD
        unit: per state
        description: One-time fee for state sales tax registration

  - name: Professional
    description: >-
      Full-featured plan for businesses needing real-time API integrations at
      checkout, advanced compliance tools, and dedicated support. Includes API
      access with 10,000 calls per minute, economic nexus insights, exemption
      certificate management, sandbox environment, and multi-user access. Ideal
      for small to mid-sized businesses and above.
    type: paid
    monthlyPrice: 99.00
    currency: USD
    trialDays: 30
    annualDiscount: true
    annualDiscountNote: Save 10% or more with annual pricing
    features:
      - type: quota
        name: orders
        description: Monthly order volume included
        metric: orders/month
        limit: 200
        overage: true
        overageNote: >-
          Flex fees available; higher tiers available up to 10M+ orders/month.
          API calculations count as 1/10th of an order each.
      - type: boolean
        name: apiAccess
        description: Real-time API tax calculations and rate lookups
        value: true
      - type: quota
        name: apiCallsPerMinute
        description: API rate limit
        metric: calls/minute
        limit: 10000
      - type: quota
        name: dataIntegrations
        description: Total unique data import and API integrations
        metric: integrations
        limit: 10
      - type: boolean
        name: sandboxEnvironment
        description: Sandbox API environment for testing
        value: true
      - type: boolean
        name: economicNexusInsights
        description: Proactive alerts when approaching new state tax obligations
        value: true
      - type: boolean
        name: exemptionCertificates
        description: Exemption certificate storage and management
        value: true
      - type: boolean
        name: multiUser
        description: Multi-user access with defined roles (up to 10 users)
        value: true
      - type: quota
        name: autoFileCredits
        description: Included AutoFile credits per year
        metric: credits/year
        limit: 4
      - type: metered
        name: additionalAutoFile
        description: Additional AutoFile return beyond included credits
        metric: per return
        price: 55.00
        currency: USD
    tiers:
      - orders: 200
        monthlyPrice: 99.00
      - orders: 500
        monthlyPrice: 249.00
      - orders: 1000
        monthlyPrice: 499.00
      - orders: 10000
        monthlyPrice: 1999.00
    additionalFees:
      - name: State Registration
        price: 299.00
        currency: USD
        unit: per state
        description: One-time fee for state sales tax registration
